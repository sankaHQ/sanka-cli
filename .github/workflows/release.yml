name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/sanka-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 "dist/sanka_cli-${VERSION}.tar.gz" | awk '{print $1}')"
          uv run python scripts/render_homebrew_formula.py \
            --version "${VERSION}" \
            --sha256 "${SHA256}" \
            --output packaging/homebrew/sanka.rb

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            packaging/homebrew/sanka.rb

      - name: Upload Homebrew formula template
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: packaging/homebrew/sanka.rb
